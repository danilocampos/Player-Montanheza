<!DOCTYPE html>
<html lang="pt-BR">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Player Rádio Montanheza</title>
  <script src="https://cdn.jsdelivr.net/npm/hls.js@latest"></script>
  <style>
    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    body {
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', sans-serif;
      background: #1a1a2e;
      min-height: 100vh;
      display: flex;
      align-items: center;
      justify-content: center;
    }

    /* ── Floating Player ── */
    #radio-player {
      position: fixed;
      bottom: 24px;
      right: 24px;
      z-index: 9999;
      font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
    }

    /* ── Mini Pill (collapsed) ── */
    #player-pill {
      display: flex;
      align-items: center;
      gap: 10px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 50px;
      padding: 8px 16px 8px 8px;
      cursor: pointer;
      box-shadow: 0 8px 32px rgba(0,0,0,0.5);
      transition: transform 0.2s ease, box-shadow 0.2s ease;
      user-select: none;
    }

    #player-pill:hover {
      transform: translateY(-2px);
      box-shadow: 0 12px 40px rgba(0,0,0,0.6);
    }

    .pill-logo {
      width: 36px;
      height: 36px;
      border-radius: 50%;
      background: linear-gradient(135deg, #1e7b34, #2da64a);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      overflow: hidden;
    }

    .pill-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 50%;
    }

    .pill-logo svg {
      width: 18px;
      height: 18px;
      fill: white;
    }

    .pill-info {
      display: flex;
      flex-direction: column;
      line-height: 1.2;
    }

    .pill-name {
      font-size: 12px;
      font-weight: 600;
      color: #fff;
      letter-spacing: 0.3px;
    }

    .pill-sub {
      font-size: 10px;
      color: rgba(255,255,255,0.45);
      letter-spacing: 0.2px;
    }

    .pill-live-dot {
      width: 6px;
      height: 6px;
      border-radius: 50%;
      background: #e53e3e;
      flex-shrink: 0;
      animation: pulse-dot 1.8s ease-in-out infinite;
    }

    @keyframes pulse-dot {
      0%, 100% { opacity: 1; transform: scale(1); }
      50% { opacity: 0.5; transform: scale(0.7); }
    }

    /* ── Expanded Card ── */
    #player-card {
      position: absolute;
      bottom: calc(100% + 12px);
      right: 0;
      width: 280px;
      background: #111;
      border: 1px solid rgba(255,255,255,0.08);
      border-radius: 20px;
      overflow: hidden;
      box-shadow: 0 20px 60px rgba(0,0,0,0.7);
      transform-origin: bottom right;
      transform: scale(0.85) translateY(8px);
      opacity: 0;
      pointer-events: none;
      transition: transform 0.25s cubic-bezier(0.34, 1.56, 0.64, 1),
                  opacity 0.2s ease;
    }

    #player-card.open {
      transform: scale(1) translateY(0);
      opacity: 1;
      pointer-events: all;
    }

    .card-header {
      background: linear-gradient(135deg, #1a4a28 0%, #0f2e18 100%);
      padding: 20px;
      display: flex;
      align-items: center;
      gap: 12px;
      position: relative;
      overflow: hidden;
    }

    .card-header::before {
      content: '';
      position: absolute;
      top: -30px;
      right: -30px;
      width: 100px;
      height: 100px;
      border-radius: 50%;
      background: rgba(255,255,255,0.04);
    }

    .card-header::after {
      content: '';
      position: absolute;
      bottom: -20px;
      left: 40px;
      width: 70px;
      height: 70px;
      border-radius: 50%;
      background: rgba(255,255,255,0.03);
    }

    .card-logo {
      width: 48px;
      height: 48px;
      border-radius: 12px;
      background: rgba(255,255,255,0.1);
      display: flex;
      align-items: center;
      justify-content: center;
      flex-shrink: 0;
      border: 1px solid rgba(255,255,255,0.1);
      overflow: hidden;
    }

    .card-logo img {
      width: 100%;
      height: 100%;
      object-fit: cover;
      border-radius: 12px;
    }

    .card-logo svg {
      width: 24px;
      height: 24px;
      fill: rgba(255,255,255,0.8);
    }

    .card-title {
      flex: 1;
      z-index: 1;
    }

    .card-title h3 {
      font-size: 15px;
      font-weight: 700;
      color: #fff;
      letter-spacing: -0.2px;
    }

    .card-title p {
      font-size: 11px;
      color: rgba(255,255,255,0.5);
      margin-top: 2px;
    }

    .live-badge {
      display: inline-flex;
      align-items: center;
      gap: 5px;
      background: #e53e3e;
      color: #fff;
      font-size: 9px;
      font-weight: 700;
      letter-spacing: 0.8px;
      padding: 3px 7px;
      border-radius: 4px;
      z-index: 1;
    }

    .live-badge .dot {
      width: 5px;
      height: 5px;
      border-radius: 50%;
      background: #fff;
      animation: pulse-dot 1.8s ease-in-out infinite;
    }

    /* ── Waveform visual ── */
    .waveform {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 3px;
      height: 40px;
      padding: 0 20px;
      background: #0d0d0d;
    }

    .wave-bar {
      width: 3px;
      border-radius: 2px;
      background: linear-gradient(180deg, #2da64a, #1e7b34);
      animation: wave 1.2s ease-in-out infinite;
      height: 8px;
      opacity: 0.3;
    }

    .wave-bar:nth-child(1)  { animation-delay: 0.0s; }
    .wave-bar:nth-child(2)  { animation-delay: 0.1s; }
    .wave-bar:nth-child(3)  { animation-delay: 0.2s; }
    .wave-bar:nth-child(4)  { animation-delay: 0.3s; }
    .wave-bar:nth-child(5)  { animation-delay: 0.4s; }
    .wave-bar:nth-child(6)  { animation-delay: 0.3s; }
    .wave-bar:nth-child(7)  { animation-delay: 0.2s; }
    .wave-bar:nth-child(8)  { animation-delay: 0.1s; }
    .wave-bar:nth-child(9)  { animation-delay: 0.0s; }
    .wave-bar:nth-child(10) { animation-delay: 0.15s; }
    .wave-bar:nth-child(11) { animation-delay: 0.25s; }
    .wave-bar:nth-child(12) { animation-delay: 0.35s; }

    @keyframes wave {
      0%, 100% { height: 6px; }
      50% { height: 22px; }
    }

    #radio-player.playing .wave-bar {
      opacity: 1;
    }

    #radio-player.playing .wave-bar {
      animation-play-state: running;
    }

    #radio-player:not(.playing) .wave-bar {
      animation-play-state: paused;
      height: 4px;
    }

    /* ── Controls ── */
    .card-controls {
      padding: 16px 20px 18px;
      display: flex;
      flex-direction: column;
      gap: 14px;
    }

    .controls-row {
      display: flex;
      align-items: center;
      justify-content: center;
      gap: 20px;
    }

    .btn-play {
      width: 54px;
      height: 54px;
      border-radius: 50%;
      background: linear-gradient(135deg, #2da64a, #1e7b34);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      transition: transform 0.15s ease, box-shadow 0.15s ease;
      box-shadow: 0 4px 20px rgba(45, 166, 74, 0.4);
      flex-shrink: 0;
    }

    .btn-play:hover {
      transform: scale(1.06);
      box-shadow: 0 6px 28px rgba(45, 166, 74, 0.55);
    }

    .btn-play:active {
      transform: scale(0.96);
    }

    .btn-play svg {
      width: 20px;
      height: 20px;
      fill: white;
    }

    /* Loading spinner inside play button */
    .btn-play .spinner {
      width: 20px;
      height: 20px;
      border: 2px solid rgba(255,255,255,0.3);
      border-top-color: #fff;
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
      display: none;
    }

    @keyframes spin {
      to { transform: rotate(360deg); }
    }

    #radio-player.loading .btn-play .icon-play,
    #radio-player.loading .btn-play .icon-pause {
      display: none;
    }

    #radio-player.loading .btn-play .spinner {
      display: block;
    }

    #radio-player.playing .btn-play .icon-play { display: none; }
    #radio-player.playing .btn-play .icon-pause { display: block; }
    #radio-player:not(.playing) .btn-play .icon-play { display: block; }
    #radio-player:not(.playing) .btn-play .icon-pause { display: none; }

    /* ── Volume ── */
    .volume-row {
      display: flex;
      align-items: center;
      gap: 10px;
    }

    .vol-icon {
      width: 16px;
      height: 16px;
      flex-shrink: 0;
      color: rgba(255,255,255,0.4);
    }

    .vol-icon svg {
      width: 100%;
      height: 100%;
      fill: currentColor;
    }

    input[type="range"] {
      -webkit-appearance: none;
      appearance: none;
      flex: 1;
      height: 3px;
      background: rgba(255,255,255,0.12);
      border-radius: 3px;
      outline: none;
      cursor: pointer;
      position: relative;
    }

    input[type="range"]::-webkit-slider-thumb {
      -webkit-appearance: none;
      appearance: none;
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #2da64a;
      cursor: pointer;
      box-shadow: 0 0 0 3px rgba(45, 166, 74, 0.2);
      transition: box-shadow 0.15s ease;
    }

    input[type="range"]::-webkit-slider-thumb:hover {
      box-shadow: 0 0 0 5px rgba(45, 166, 74, 0.3);
    }

    input[type="range"]::-moz-range-thumb {
      width: 14px;
      height: 14px;
      border-radius: 50%;
      background: #2da64a;
      cursor: pointer;
      border: none;
    }

    /* ── Status text ── */
    .status-text {
      font-size: 10px;
      color: rgba(255,255,255,0.3);
      text-align: center;
      letter-spacing: 0.3px;
      min-height: 14px;
    }

    /* ── Close button ── */
    .btn-close {
      position: absolute;
      top: 10px;
      right: 10px;
      width: 22px;
      height: 22px;
      border-radius: 50%;
      background: rgba(255,255,255,0.08);
      border: none;
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      color: rgba(255,255,255,0.5);
      transition: background 0.15s ease, color 0.15s ease;
      z-index: 2;
    }

    .btn-close:hover {
      background: rgba(255,255,255,0.15);
      color: #fff;
    }

    .btn-close svg {
      width: 10px;
      height: 10px;
      fill: currentColor;
    }

    /* ── Mute btn ── */
    .btn-mute {
      background: none;
      border: none;
      cursor: pointer;
      padding: 0;
      display: flex;
      align-items: center;
    }
  </style>
</head>
<body>

<!-- ═══════════════════════════════════════════
     COMO INCORPORAR NO SEU SITE:
     Copie tudo que está dentro de #radio-player
     e cole antes do </body> do seu site.
     Inclua a tag <script src="hls.js"> no <head>.
     ═══════════════════════════════════════════ -->

<div id="radio-player">

  <!-- Card expandido -->
  <div id="player-card">
    <div class="card-header">
      <div class="card-logo">
        <!-- Substitua pela logo real se tiver -->
        <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
          <path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm-1 13V8l6 4-6 4z"/>
        </svg>
      </div>
      <div class="card-title">
        <h3>Rádio Montanheza</h3>
        <p>FM 93.5 • Ao vivo</p>
      </div>
      <div class="live-badge">
        <span class="dot"></span>
        LIVE
      </div>
      <button class="btn-close" id="btn-close" title="Fechar">
        <svg viewBox="0 0 10 10"><path d="M1 1l8 8M9 1L1 9" stroke="currentColor" stroke-width="1.5" stroke-linecap="round" fill="none"/></svg>
      </button>
    </div>

    <div class="waveform">
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
      <div class="wave-bar"></div>
    </div>

    <div class="card-controls">
      <div class="controls-row">
        <button class="btn-play" id="btn-play" title="Play / Pause">
          <!-- Play icon -->
          <svg class="icon-play" viewBox="0 0 24 24"><path d="M8 5v14l11-7z"/></svg>
          <!-- Pause icon -->
          <svg class="icon-pause" viewBox="0 0 24 24" style="display:none"><path d="M6 19h4V5H6v14zm8-14v14h4V5h-4z"/></svg>
          <!-- Spinner -->
          <div class="spinner"></div>
        </button>
      </div>

      <div class="volume-row">
        <button class="btn-mute" id="btn-mute" title="Mute / Unmute">
          <div class="vol-icon">
            <svg class="icon-vol-on" viewBox="0 0 24 24"><path d="M3 9v6h4l5 5V4L7 9H3zm13.5 3c0-1.77-1.02-3.29-2.5-4.03v8.05c1.48-.73 2.5-2.25 2.5-4.02z"/></svg>
            <svg class="icon-vol-off" viewBox="0 0 24 24" style="display:none"><path d="M16.5 12c0-1.77-1.02-3.29-2.5-4.03v2.21l2.45 2.45c.03-.2.05-.41.05-.63zm2.5 0c0 .94-.2 1.82-.54 2.64l1.51 1.51C20.63 14.91 21 13.5 21 12c0-4.28-2.99-7.86-7-8.77v2.06c2.89.86 5 3.54 5 6.71zM4.27 3L3 4.27 7.73 9H3v6h4l5 5v-6.73l4.25 4.25c-.67.52-1.42.93-2.25 1.18v2.06c1.38-.31 2.63-.95 3.69-1.81L19.73 21 21 19.73l-9-9L4.27 3zM12 4L9.91 6.09 12 8.18V4z"/></svg>
          </div>
        </button>
        <input type="range" id="volume" min="0" max="100" value="80" title="Volume">
        <span id="vol-display" style="font-size:10px;color:rgba(255,255,255,0.35);width:28px;text-align:right">80%</span>
      </div>

      <div class="status-text" id="status-text">Clique para ouvir</div>
    </div>
  </div>

  <!-- Pílula (sempre visível) -->
  <div id="player-pill">
    <div class="pill-logo">
      <svg viewBox="0 0 24 24" xmlns="http://www.w3.org/2000/svg">
        <path d="M12 3a9 9 0 100 18A9 9 0 0012 3zm-1 13V8l6 4-6 4z"/>
      </svg>
    </div>
    <div class="pill-info">
      <span class="pill-name">Rádio Montanheza</span>
      <span class="pill-sub">FM 93.5 • Ao vivo</span>
    </div>
    <div class="pill-live-dot"></div>
  </div>

</div>

<audio id="radio-audio" preload="none"></audio>

<script>
(function () {
  const STREAM_URL = 'https://5a57bda70564a.streamlock.net/montanheza/montanheza.stream/playlist.m3u8';

  const player    = document.getElementById('radio-player');
  const card      = document.getElementById('player-card');
  const pill      = document.getElementById('player-pill');
  const btnPlay   = document.getElementById('btn-play');
  const btnClose  = document.getElementById('btn-close');
  const btnMute   = document.getElementById('btn-mute');
  const volSlider = document.getElementById('volume');
  const volDisplay= document.getElementById('vol-display');
  const statusTxt = document.getElementById('status-text');
  const audio     = document.getElementById('radio-audio');
  const iconVolOn = btnMute.querySelector('.icon-vol-on');
  const iconVolOff= btnMute.querySelector('.icon-vol-off');

  let hls = null;
  let isPlaying = false;
  let isLoading = false;

  // ── HLS setup ──────────────────────────────
  function initHLS() {
    if (Hls.isSupported()) {
      if (hls) { hls.destroy(); }
      hls = new Hls({
        enableWorker: true,
        lowLatencyMode: true,
      });
      hls.loadSource(STREAM_URL);
      hls.attachMedia(audio);
      hls.on(Hls.Events.MANIFEST_PARSED, () => {
        audio.play().catch(() => setStatus('Erro ao iniciar'));
      });
      hls.on(Hls.Events.ERROR, (_, data) => {
        if (data.fatal) {
          setStatus('Erro de conexão. Tentando reconectar…');
          setTimeout(() => { if (isPlaying) initHLS(); }, 3000);
        }
      });
    } else if (audio.canPlayType('application/vnd.apple.mpegurl')) {
      // Safari native HLS
      audio.src = STREAM_URL;
      audio.play().catch(() => setStatus('Erro ao iniciar'));
    } else {
      setStatus('Navegador não suportado');
    }
  }

  function stopHLS() {
    if (hls) {
      hls.stopLoad();
      hls.detachMedia();
      hls.destroy();
      hls = null;
    }
    audio.src = '';
    audio.load();
  }

  // ── State helpers ───────────────────────────
  function setStatus(msg) {
    statusTxt.textContent = msg;
  }

  function setLoading(v) {
    isLoading = v;
    if (v) {
      player.classList.add('loading');
      player.classList.remove('playing');
      setStatus('Carregando stream…');
    } else {
      player.classList.remove('loading');
    }
  }

  function setPlaying(v) {
    isPlaying = v;
    if (v) {
      player.classList.add('playing');
      setStatus('Transmitindo ao vivo ●');
    } else {
      player.classList.remove('playing');
      setStatus('Pausado');
    }
  }

  // ── Audio events ────────────────────────────
  audio.addEventListener('waiting',  () => setLoading(true));
  audio.addEventListener('playing',  () => { setLoading(false); setPlaying(true); });
  audio.addEventListener('pause',    () => { setLoading(false); setPlaying(false); });
  audio.addEventListener('error',    () => { setLoading(false); setStatus('Erro no stream'); });

  // ── Play / Pause ────────────────────────────
  btnPlay.addEventListener('click', () => {
    if (isLoading) return;
    if (isPlaying) {
      stopHLS();
      setPlaying(false);
    } else {
      setLoading(true);
      initHLS();
    }
  });

  // ── Volume ──────────────────────────────────
  audio.volume = volSlider.value / 100;

  volSlider.addEventListener('input', () => {
    const v = volSlider.value;
    audio.volume = v / 100;
    audio.muted = v == 0;
    volDisplay.textContent = v + '%';
    updateVolIcon();
    updateSliderTrack();
  });

  btnMute.addEventListener('click', () => {
    audio.muted = !audio.muted;
    if (audio.muted) {
      volSlider.value = 0;
      volDisplay.textContent = '0%';
    } else {
      const restore = audio.volume > 0 ? Math.round(audio.volume * 100) : 60;
      audio.volume = restore / 100;
      volSlider.value = restore;
      volDisplay.textContent = restore + '%';
    }
    updateVolIcon();
    updateSliderTrack();
  });

  function updateVolIcon() {
    const muted = audio.muted || audio.volume === 0;
    iconVolOn.style.display  = muted ? 'none' : 'block';
    iconVolOff.style.display = muted ? 'block' : 'none';
  }

  function updateSliderTrack() {
    const pct = volSlider.value + '%';
    volSlider.style.background =
      `linear-gradient(to right, #2da64a ${pct}, rgba(255,255,255,0.12) ${pct})`;
  }

  updateSliderTrack();

  // ── Card toggle ─────────────────────────────
  pill.addEventListener('click', () => {
    card.classList.toggle('open');
  });

  btnClose.addEventListener('click', (e) => {
    e.stopPropagation();
    card.classList.remove('open');
  });

  // Close card when clicking outside
  document.addEventListener('click', (e) => {
    if (!player.contains(e.target)) {
      card.classList.remove('open');
    }
  });

})();
</script>

</body>
</html>
